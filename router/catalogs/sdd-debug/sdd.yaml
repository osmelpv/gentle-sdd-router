name: sdd-debug
version: 2
description: "Unified debug workflow. Consolidates area analysis, log guard implantation, forensic evidence collection, fix application, and verification into 5 phases. Orchestrator retains strategic phases (crime scene investigation, loop control). Delegated phases handle mechanical work."

orchestrator:
  retained_phases:
    - collect-and-diagnose
    - finalize

phases:
  analyze-area:
    phase_order: 1
    intent: "Map problem area (language, ecosystem, infrastructure), select optimal logging system, and assess which areas are TDD-testable vs require log guards. Produce Area Analysis Report."
    execution: sequential
    agents: 1
    judge: false
    radar: false
    delegation: sub-agent
    input: "debug_request with issue description, affected files, error messages, stack traces, environment info"
    output: "Area Analysis Report: ecosystem map, dependency graph, testability assessment, logging system selection, TDD vs Guards classification"
    context_return: "full_report"

  implant-logs:
    phase_order: 2
    intent: "Plant log guards at EVERY execution step. Create TDD tests where testable. Build Guard Position Registry with unique SDD-DBG-GXXX markers for deterministic cleanup."
    execution: sequential
    agents: 1
    judge: false
    radar: false
    depends_on:
      - analyze-area
    delegation: sub-agent
    input: "Area Analysis Report with logging selection and testability assessment"
    output: "Implanted log guards, TDD tests, Guard Position Registry (file:line:marker:type:purpose)"
    context_return: "guard_registry"

  collect-and-diagnose:
    phase_order: 3
    intent: "THE CRIME SCENE. Determine execution path (AI-first: tests/mocks/MCP/automation before asking user). Collect ALL logs — not just first error. Build complete forensic timeline. Propose solutions addressing root cause."
    execution: sequential
    agents: 1
    judge: false
    radar: false
    depends_on:
      - implant-logs
    delegation: orchestrator
    enriched_context:
      - artifact: area-analysis
        from: analyze-area
        fields:
          - testability_assessment
          - risk_zones
          - dependency_graph
          - ecosystem_map
      - artifact: guard-registry
        from: implant-logs
        fields:
          - all_positions
          - log_types
          - tdd_tests
    input: "Guard Position Registry + Area Analysis + testability assessment"
    output: "Complete log dump, forensic timeline, error chain, TDD results, proposed solutions with root cause analysis"
    checkpoint:
      before_next: true
      show_user:
        - forensic_report
        - proposed_changes
        - files_to_touch
        - root_cause_analysis
      user_actions:
        - approve
        - question
        - contradict
      on_contradict: loop_self

  apply-fixes:
    phase_order: 4
    intent: "Implement the approved fix with minimal change surface. Run FULL regression check. Verify fix works AND no previously-passing test fails."
    execution: sequential
    agents: 1
    judge: false
    radar: false
    depends_on:
      - collect-and-diagnose
    delegation: sub-agent
    input: "Approved proposed solution with files to touch and impact analysis"
    output: "Modified files, new tests, regression report (before/after, expected vs regression failures)"
    context_return: "files_changed + regression_report"

  finalize:
    phase_order: 5
    intent: "Re-execute scenario to confirm fix. If NOT fixed: cycle back to collect-and-diagnose with new evidence. If FIXED: clean ALL guards, deliver final report, suggest tests, record lessons in Engram."
    execution: sequential
    agents: 1
    judge: false
    radar: false
    depends_on:
      - apply-fixes
    delegation: orchestrator
    loop_target: collect-and-diagnose
    enriched_context:
      - artifact: regression-report
        from: apply-fixes
        fields:
          - fix_status
          - new_failures
          - confidence
      - artifact: guard-registry
        from: implant-logs
        fields:
          - all_positions
      - artifact: area-analysis
        from: analyze-area
        fields:
          - full_report
    input: "Regression report + fix status + Guard Position Registry"
    output: "If cycling: recovered logs for next iteration. If fixed: final debug report, guards cleaned, Engram entries, test suggestions"
