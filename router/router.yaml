version: 3

active_catalog: default
active_preset: latest
active_profile: latest
activation_state: active

metadata:
  installation_contract:
    source_of_truth: router/router.yaml
    install_command: gsr install
    bootstrap_command: gsr bootstrap
    shell_fallback: gsr bootstrap --no-apply
    runtime_execution: false

catalogs:
  default:
    availability: stable
    complexity: high
    presets:
      balanced:
        availability: stable
        aliases: latest
        complexity: high
        fallbacks: safety
        phases:
          orchestrator:
            - kind: lane
              phase: orchestrator
              role: primary
              target: anthropic/claude-sonnet
              fallbacks: openai/gpt
            - kind: lane
              phase: orchestrator
              role: judge
              target: openai/o3
              fallbacks: google/gemini-pro
          explore:
            - kind: lane
              phase: explore
              role: primary
              target: google/gemini-flash
              fallbacks: openai/gpt
            - kind: lane
              phase: explore
              role: radar
              target: anthropic/claude-sonnet
              fallbacks: openai/gpt
          spec:
            - kind: lane
              phase: spec
              role: primary
              target: anthropic/claude-opus
              fallbacks: openai/o3
          design:
            - kind: lane
              phase: design
              role: primary
              target: anthropic/claude-opus
              fallbacks: openai/o3
          tasks:
            - kind: lane
              phase: tasks
              role: primary
              target: google/gemini-flash
              fallbacks: openai/gpt
            - kind: lane
              phase: tasks
              role: secondary
              target: openai/gpt
              fallbacks: anthropic/claude-sonnet
          apply:
            - kind: lane
              phase: apply
              role: primary
              target: ollama/qwen3-coder
              fallbacks: anthropic/claude-sonnet
            - kind: lane
              phase: apply
              role: secondary
              target: anthropic/claude-sonnet
              fallbacks: openai/gpt
          verify:
            - kind: lane
              phase: verify
              role: judge
              target: openai/o3
              fallbacks: anthropic/claude-opus
            - kind: lane
              phase: verify
              role: radar
              target: anthropic/claude-opus
              fallbacks: google/gemini-pro
          archive:
            - kind: lane
              phase: archive
              role: radar
              target: google/gemini-flash
              fallbacks: openai/gpt
        metadata:
          note: balanced metadata only
      safety:
        availability: unavailable
        complexity: medium
        fallbacks: balanced
        phases:
          orchestrator:
            - kind: lane
              phase: orchestrator
              role: primary
              target: openai/gpt
              fallbacks: anthropic/claude-sonnet
          verify:
            - kind: lane
              phase: verify
              role: judge
              target: openai/o3
              fallbacks: anthropic/claude-opus
