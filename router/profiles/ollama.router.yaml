name: ollama
sdd: agent-orchestrator
availability: stable
builtin: true
complexity: medium
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
hidden: true
phases:
  orchestrator:
    model: ollama/qwen3.5
    fallbacks:
      - ollama/qwen3
  explore:
    model: ollama/qwen3.5
    fallbacks:
      - ollama/deepseek-r1
  spec:
    model: ollama/qwen3.5
    fallbacks:
      - ollama/qwen3
  design:
    model: ollama/qwen3.5
    fallbacks:
      - ollama/qwq
  tasks:
    model: ollama/qwen3
    fallbacks:
      - ollama/qwen3.5
  apply:
    model: ollama/qwen3-coder
    fallbacks:
      - ollama/devstral
  verify:
    model: ollama/qwq
    fallbacks:
      - ollama/deepseek-r1
  archive:
    model: ollama/qwen3
    fallbacks:
      - ollama/qwen3.5