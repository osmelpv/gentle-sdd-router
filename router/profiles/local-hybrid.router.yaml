name: local-hybrid
sdd: agent-orchestrator
availability: stable
complexity: medium
debug_invoke:
  preset: sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
identity:
  inherit_agents_md: true
  persona: gentleman
phases:
  orchestrator:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: orchestrator
      role: primary
      fallbacks: "opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/devstral-small-2:24b"
  explore:
    - target: opencode/nemotron-3-super-free
      kind: lane
      phase: explore
      role: primary
      fallbacks: "opencode/qwen3.6-plus-free, opencode/mimo-v2-pro-free, opencode/minimax-m2.5-free, ollama/devstral-small-2:24b"
  propose:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: propose
      role: primary
      fallbacks: opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2
  spec:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: spec
      role: primary
      fallbacks: opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2
  design:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: design
      role: primary
      fallbacks: opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2
  tasks:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: tasks
      role: primary
      fallbacks: opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2
  apply:
    - target: anthropic/claude-sonnet-4-6
      kind: lane
      phase: apply
      role: primary
      fallbacks: "ollama/devstral-small-2:24b, opencode/qwen3.6-plus-free, opencode/nemotron-3-super-free, opencode/mimo-v2-pro-free, ollama/qwen3.5:35b"
  verify:
    - target: openai/gpt-5.4
      kind: lane
      phase: verify
      role: judge
      fallbacks: opencode/qwen3.6-plus-free, opencode/mimo-v2-pro-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2
  archive:
    - target: google/gemini-3-flash-preview
      kind: lane
      phase: archive
      role: primary
      fallbacks: opencode/mimo-v2-pro-free, opencode/nemotron-3-super-free, opencode/minimax-m2.5-free, ollama/nemotron-cascade-2