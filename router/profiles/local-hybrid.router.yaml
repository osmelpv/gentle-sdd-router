name: local-hybrid
sdd: agent-orchestrator
availability: stable
complexity: medium
debug_invoke:
  preset: sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
identity:
  inherit_agents_md: true
  persona: gentleman
phases:
  orchestrator:
    - target: anthropic/claude-sonnet-4-6
      kind: lane
      phase: orchestrator
      role: primary
      fallbacks: mistral/mistral-large-3, opencode/qwen3.6-plus-free, opencode-go/glm-5
  explore:
    - target: opencode/nemotron-3-super-free
      kind: lane
      phase: explore
      role: primary
      fallbacks: opencode-go/glm-5, mistral/mixtral-8x22b, opencode/qwen3.6-plus-free
  propose:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: propose
      role: primary
      fallbacks: opencode-go/kimi-k2.5, opencode-go/glm-5, opencode/nemotron-3-super-free
  spec:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: spec
      role: primary
      fallbacks: mistral/devstral-medium, opencode-go/glm-5, mistral/mistral-medium-3.1
  design:
    - target: anthropic/claude-opus
      kind: lane
      phase: design
      role: primary
      fallbacks: opencode-go/kimi-k2.5, mistral/pixtral-large-latest, opencode/qwen3.6-plus-free
  tasks:
    - target: opencode/qwen3.6-plus-free
      kind: lane
      phase: tasks
      role: primary
      fallbacks: opencode-go/minimax-m2.5, opencode/nemotron-3-super-free, opencode-go/mimo-v2-pro, mistral/mistral-nemo
  apply:
    - target: anthropic/claude-sonnet-4-6
      kind: lane
      phase: apply
      role: primary
      fallbacks: mistral/codestral-latest, mistral/devstral-2-latest, opencode-go/kimi-k2.5, opencode/qwen3.6-plus-free
  verify:
    - target: openai/gpt-5.4
      kind: lane
      phase: verify
      role: judge
      fallbacks: mistral/codestral-latest, mistral/mistral-large-3, opencode/qwen3.6-plus-free, opencode/nemotron-3-super-free
  archive:
    - target: opencode-go/mimo-v2-omni
      kind: lane
      phase: archive
      role: primary
      fallbacks: opencode/big-pickle, opencode/qwen3.6-plus-free, mistral/mistral-nemo