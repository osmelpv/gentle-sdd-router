name: free
sdd: agent-orchestrator
availability: stable
builtin: true
complexity: low
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
identity:
  inherit_agents_md: true
  persona: gentleman
phases:
  orchestrator:
    model: mistral/mistral-large-3
    fallbacks:
      - opencode/qwen3.6-plus-free
      - opencode-go/glm-5
      - opencode-go/mimo-v2-pro
  explore:
    model: mistral/mixtral-8x22b
    fallbacks:
      - mistral/mistral-large-3
      - opencode/nemotron-3-super-free
      - opencode/qwen3.6-plus-free
  propose:
    model: mistral/mistral-large-3
    fallbacks:
      - opencode-go/glm-5
      - opencode/qwen3.6-plus-free
      - mistral/mixtral-8x22b
  spec:
    model: mistral/devstral-medium
    fallbacks:
      - opencode-go/glm-5
      - mistral/mistral-medium-3.1
      - opencode-go/mimo-v2-pro
  design:
    model: opencode-go/kimi-k2.5
    fallbacks:
      - mistral/pixtral-large-latest
      - mistral/pixtral-12b
      - opencode/qwen3.6-plus-free
  tasks:
    model: opencode-go/minimax-m2.5
    fallbacks:
      - opencode/nemotron-3-super-free
      - mistral/mistral-nemo
      - mistral/ministral-8b-latest
  apply:
    model: mistral/codestral-latest
    fallbacks:
      - mistral/devstral-2-latest
      - opencode/qwen3.6-plus-free
      - mistral/mistral-nemo
  verify:
    model: mistral/codestral-latest
    fallbacks:
      - mistral/mistral-large-3
      - opencode/nemotron-3-super-free
      - opencode/qwen3.6-plus-free
  archive:
    model: opencode-go/mimo-v2-omni
    fallbacks:
      - opencode/big-pickle
      - opencode/opencode-zen
      - mistral/mistral-nemo