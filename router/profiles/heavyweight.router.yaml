name: heavyweight
sdd: agent-orchestrator
availability: stable
builtin: true
complexity: extreme
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
hidden: true
phases:
  orchestrator:
    model: anthropic/claude-opus
    fallbacks:
      - anthropic/claude-sonnet
  explore:
    model: google/gemini-pro
    fallbacks:
      - google/gemini-flash
  spec:
    model: anthropic/claude-opus
    fallbacks:
      - anthropic/claude-sonnet
  design:
    model: anthropic/claude-opus
    fallbacks:
      - anthropic/claude-sonnet
  tasks:
    model: anthropic/claude-sonnet
    fallbacks:
      - anthropic/claude-haiku
  apply:
    model: anthropic/claude-sonnet
    fallbacks:
      - anthropic/claude-haiku
  verify:
    model: openai/gpt-5
    fallbacks:
      - openai/o3
  archive:
    model: google/gemini-flash
    fallbacks:
      - google/gemini-flash