name: multivendor
sdd: agent-orchestrator
availability: stable
builtin: true
aliases: latest
complexity: high
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
phases:
  orchestrator:
    model: anthropic/claude-opus
    fallbacks:
      - openai/gpt-5
  explore:
    model: google/gemini-pro
    fallbacks:
      - anthropic/claude-sonnet
  spec:
    model: anthropic/claude-opus
    fallbacks:
      - openai/gpt-5
  design:
    model: anthropic/claude-opus
    fallbacks:
      - openai/gpt-5
  tasks:
    model: anthropic/claude-sonnet
    fallbacks:
      - openai/gpt
  apply:
    model: anthropic/claude-sonnet
    fallbacks:
      - openai/gpt-5
  verify:
    model: openai/gpt-5
    fallbacks:
      - anthropic/claude-opus
  archive:
    model: google/gemini-flash
    fallbacks:
      - anthropic/claude-haiku