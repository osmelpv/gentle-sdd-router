name: multivendor
availability: stable
aliases: latest
complexity: high
debug_invoke:
  preset: sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
phases:
  orchestrator:
    - target: anthropic/claude-opus
      kind: lane
      phase: orchestrator
      role: primary
      fallbacks: openai/gpt-5
      inputPerMillion: 15
      outputPerMillion: 75
      contextWindow: 200000
  explore:
    - target: google/gemini-pro
      kind: lane
      phase: explore
      role: primary
      fallbacks: anthropic/claude-sonnet
      inputPerMillion: 1.25
      outputPerMillion: 5
      contextWindow: 2000000
  spec:
    - target: anthropic/claude-opus
      kind: lane
      phase: spec
      role: primary
      fallbacks: openai/gpt-5
      inputPerMillion: 15
      outputPerMillion: 75
      contextWindow: 200000
  design:
    - target: anthropic/claude-opus
      kind: lane
      phase: design
      role: primary
      fallbacks: openai/gpt-5
      inputPerMillion: 15
      outputPerMillion: 75
      contextWindow: 200000
  tasks:
    - target: anthropic/claude-sonnet
      kind: lane
      phase: tasks
      role: primary
      fallbacks: openai/gpt
      inputPerMillion: 3
      outputPerMillion: 15
      contextWindow: 200000
  apply:
    - target: anthropic/claude-sonnet
      kind: lane
      phase: apply
      role: primary
      fallbacks: openai/gpt-5
      inputPerMillion: 3
      outputPerMillion: 15
      contextWindow: 200000
  verify:
    - target: openai/gpt-5
      kind: lane
      phase: verify
      role: judge
      fallbacks: anthropic/claude-opus
      inputPerMillion: 10
      outputPerMillion: 30
      contextWindow: 1000000
  archive:
    - target: google/gemini-flash
      kind: lane
      phase: archive
      role: primary
      fallbacks: anthropic/claude-haiku
      inputPerMillion: 0.075
      outputPerMillion: 0.30
      contextWindow: 1000000