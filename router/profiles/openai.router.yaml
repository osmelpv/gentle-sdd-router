name: openai
sdd: agent-orchestrator
availability: stable
complexity: medium
debug_invoke:
  preset: sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
phases:
  orchestrator:
    - target: openai/gpt-5
      kind: lane
      phase: orchestrator
      role: primary
      fallbacks: openai/gpt
      contextWindow: 1000000
  explore:
    - target: openai/gpt
      kind: lane
      phase: explore
      role: primary
      fallbacks: openai/gpt-mini
      contextWindow: 128000
  spec:
    - target: openai/gpt-5
      kind: lane
      phase: spec
      role: primary
      fallbacks: openai/gpt
      contextWindow: 1000000
  design:
    - target: openai/gpt-5
      kind: lane
      phase: design
      role: primary
      fallbacks: openai/gpt
      contextWindow: 1000000
  tasks:
    - target: openai/gpt
      kind: lane
      phase: tasks
      role: primary
      fallbacks: openai/gpt-mini
      contextWindow: 128000
  apply:
    - target: openai/gpt-5
      kind: lane
      phase: apply
      role: primary
      fallbacks: openai/gpt
      contextWindow: 1000000
  verify:
    - target: openai/o3
      kind: lane
      phase: verify
      role: judge
      fallbacks: openai/gpt-5
      contextWindow: 200000
  archive:
    - target: openai/gpt-mini
      kind: lane
      phase: archive
      role: primary
      fallbacks: openai/gpt
      contextWindow: 128000
hidden: true