name: openai
sdd: agent-orchestrator
availability: stable
builtin: true
complexity: medium
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
hidden: true
phases:
  orchestrator:
    model: openai/gpt-5
    fallbacks:
      - openai/gpt
  explore:
    model: openai/gpt
    fallbacks:
      - openai/gpt-mini
  spec:
    model: openai/gpt-5
    fallbacks:
      - openai/gpt
  design:
    model: openai/gpt-5
    fallbacks:
      - openai/gpt
  tasks:
    model: openai/gpt
    fallbacks:
      - openai/gpt-mini
  apply:
    model: openai/gpt-5
    fallbacks:
      - openai/gpt
  verify:
    model: openai/o3
    fallbacks:
      - openai/gpt-5
  archive:
    model: openai/gpt-mini
    fallbacks:
      - openai/gpt