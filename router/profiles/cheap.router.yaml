name: cheap
sdd: agent-orchestrator
availability: stable
complexity: low
debug_invoke:
  preset: sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
phases:
  orchestrator:
