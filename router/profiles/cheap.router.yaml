name: cheap
sdd: agent-orchestrator
availability: stable
builtin: true
complexity: low
debug_invoke:
  profile: gsr-sdd-debug-mono
  trigger: on_issues
  input_from: verify_output
  required_fields:
    - issues
    - affected_files
    - last_change_files
    - test_baseline
hidden: true
phases:
  orchestrator:
    model: openai/gpt-oss-20b
    fallbacks:
      - google/gemma-3-27b
  explore:
    model: google/gemini-flash
    fallbacks:
      - openai/gpt-mini
  spec:
    model: openai/gpt-oss-120b
    fallbacks:
      - openai/gpt-oss-20b
  design:
    model: openai/gpt-oss-120b
    fallbacks:
      - openai/gpt-oss-20b
  tasks:
    model: openai/gpt-mini
    fallbacks:
      - openai/gpt-oss-20b
  apply:
    model: openai/gpt-oss-120b
    fallbacks:
      - openai/gpt-oss-20b
  verify:
    model: openai/gpt-oss-20b
    fallbacks:
      - openai/gpt-oss-120b
  archive:
    model: openai/gpt-mini
    fallbacks:
      - google/gemini-flash